<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pearl Helix</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0d0d1a;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #a78bfa, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .tagline {
      font-size: 1.25rem;
      color: #a0a0b8;
      max-width: 480px;
      line-height: 1.6;
    }
    footer {
      margin-top: 4rem;
      font-size: 0.85rem;
      color: #55556a;
    }
  </style>
</head>
<body>
  <div class="logo">Pearl Helix</div>
  <p class="tagline">Coming soon. Something beautiful is on its way.</p>
  <footer>&copy; 2026 Pearl Helix &mdash; pearlhelix.info</footer>
</body>
</html>
